# HTTP — redirect all traffic to HTTPS
server {
    listen 80;
    server_name healthsignal.yakirzaken.com;
    return 301 https://$host$request_uri;
}

# HTTPS — production
server {
    listen 443 ssl;
    server_name healthsignal.yakirzaken.com;

    ssl_certificate /etc/nginx/certs/origin.pem;
    ssl_certificate_key /etc/nginx/certs/origin.key;

    client_max_body_size 25M;

    # API routes — proxy to backend
    location ~ ^/(auth|documents|ai|lab-results|symptom-entries|supplement-entries|timeline|conversations|health) {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto https;
        # SSE and long-running ingestion support
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 310s;
    }

    # Frontend SPA — serve static files, fall back to index.html
    location / {
        root /usr/share/nginx/html;
        try_files $uri $uri/ /index.html;
    }
}
