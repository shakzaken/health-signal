services:

  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: yakir
      POSTGRES_DB: healthsignal
      POSTGRES_HOST_AUTH_METHOD: trust
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U yakir -d healthsignal"]
      interval: 5s
      timeout: 5s
      retries: 10

  qdrant:
    image: qdrant/qdrant
    volumes:
      - qdrant_data:/qdrant/storage

  migrate:
    build: ./backend
    env_file: ./backend/.env
    environment:
      DATABASE_URL: postgresql+asyncpg://yakir@postgres:5432/healthsignal
    command: ["alembic", "upgrade", "head"]
    depends_on:
      postgres:
        condition: service_healthy

  backend:
    build: ./backend
    env_file: ./backend/.env
    environment:
      # Override .env.backend values with docker-internal hostnames
      DATABASE_URL: postgresql+asyncpg://yakir@postgres:5432/healthsignal
      AI_AGENT_URL: http://ai-agent:8001
      FILE_STORAGE_PATH: /app/uploads
    volumes:
      - uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

  ai-agent:
    build: ./ai-agent
    env_file: ./ai-agent/.env
    environment:
      # Override .env.ai-agent values with docker-internal hostnames
      DATABASE_URL: postgresql+asyncpg://yakir@postgres:5432/healthsignal
      BACKEND_URL: http://backend:8000
      QDRANT_HOST: qdrant
    volumes:
      - uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy

  nginx:
    build:
      context: ./frontend
      args:
        VITE_BACKEND_URL: ""  # empty = relative URLs, nginx proxies /auth /documents /ai etc. to backend
        VITE_SENTRY_DSN: ${VITE_SENTRY_DSN:-}
        VITE_GOOGLE_CLIENT_ID: ${VITE_GOOGLE_CLIENT_ID:-}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    depends_on:
      - backend

volumes:
  postgres_data:
  qdrant_data:
  uploads:
