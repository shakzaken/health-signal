# Restore the real client IP from Cloudflare's CF-Connecting-IP header —
# without this, $remote_addr is always Cloudflare's edge IP (we sit behind
# their proxy), which would break IP-based rate limiting below.
# Ranges from https://www.cloudflare.com/ips/ — verify periodically, they
# change rarely but aren't guaranteed static.
set_real_ip_from 173.245.48.0/20;
set_real_ip_from 103.21.244.0/22;
set_real_ip_from 103.22.200.0/22;
set_real_ip_from 103.31.4.0/22;
set_real_ip_from 141.101.64.0/18;
set_real_ip_from 108.162.192.0/18;
set_real_ip_from 190.93.240.0/20;
set_real_ip_from 188.114.96.0/20;
set_real_ip_from 197.234.240.0/22;
set_real_ip_from 198.41.128.0/17;
set_real_ip_from 162.158.0.0/15;
set_real_ip_from 104.16.0.0/13;
set_real_ip_from 104.24.0.0/14;
set_real_ip_from 172.64.0.0/13;
set_real_ip_from 131.0.72.0/22;
set_real_ip_from 2400:cb00::/32;
set_real_ip_from 2606:4700::/32;
set_real_ip_from 2803:f800::/32;
set_real_ip_from 2405:b500::/32;
set_real_ip_from 2405:8100::/32;
set_real_ip_from 2a06:98c0::/29;
set_real_ip_from 2c0f:f248::/32;
real_ip_header CF-Connecting-IP;

# Rate limit zones for auth routes — nginx-level defense-in-depth behind
# the Cloudflare edge rate limiting rule (see docs/post-production-tasks.md Phase 9).
# nginx only supports r/s or r/m granularity (no r/h) — register/resend use
# 1r/m here as the closest practical approximation; the real ~3/hour limit
# is enforced by the Cloudflare rule instead, which supports arbitrary windows.
limit_req_zone $binary_remote_addr zone=auth_login:10m rate=5r/m;
limit_req_zone $binary_remote_addr zone=auth_register:10m rate=3r/m;
limit_req_zone $binary_remote_addr zone=auth_resend:10m rate=3r/m;
limit_req_zone $binary_remote_addr zone=auth_google:10m rate=5r/m;

# HTTP — redirect all traffic to HTTPS
server {
    listen 80;
    server_name healthsignal.yakirzaken.com;
    return 301 https://$host$request_uri;
}

# HTTPS — production
server {
    listen 443 ssl;
    server_name healthsignal.yakirzaken.com;

    ssl_certificate /etc/nginx/certs/origin.pem;
    ssl_certificate_key /etc/nginx/certs/origin.key;

    client_max_body_size 25M;

    # Auth routes — rate limited (brute-force / spam protection, see Phase 9)
    location = /api/auth/login {
        limit_req zone=auth_login burst=3 nodelay;
        limit_req_status 429;
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto https;
    }

    location = /api/auth/register {
        limit_req zone=auth_register burst=2 nodelay;
        limit_req_status 429;
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto https;
    }

    location = /api/auth/resend-verification {
        limit_req zone=auth_resend burst=2 nodelay;
        limit_req_status 429;
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto https;
    }

    location = /api/auth/google/verify {
        limit_req zone=auth_google burst=3 nodelay;
        limit_req_status 429;
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto https;
    }

    # API routes — proxy to backend
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto https;
        # SSE and long-running ingestion support
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 310s;
    }

    # Frontend SPA — serve static files, fall back to index.html
    location / {
        root /usr/share/nginx/html;
        try_files $uri $uri/ /index.html;
    }
}
