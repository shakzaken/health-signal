# Rate limit zones for auth routes — same policy as production (see nginx.conf)
limit_req_zone $binary_remote_addr zone=auth_login:10m rate=5r/m;
limit_req_zone $binary_remote_addr zone=auth_register:10m rate=1r/m;
limit_req_zone $binary_remote_addr zone=auth_resend:10m rate=1r/m;
limit_req_zone $binary_remote_addr zone=auth_google:10m rate=5r/m;

server {
    listen 80;

    client_max_body_size 25M;

    # Auth routes — rate limited (brute-force / spam protection, see Phase 9)
    location = /api/auth/login {
        limit_req zone=auth_login burst=3 nodelay;
        limit_req_status 429;
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location = /api/auth/register {
        limit_req zone=auth_register burst=2 nodelay;
        limit_req_status 429;
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location = /api/auth/resend-verification {
        limit_req zone=auth_resend burst=2 nodelay;
        limit_req_status 429;
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location = /api/auth/google/verify {
        limit_req zone=auth_google burst=3 nodelay;
        limit_req_status 429;
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # API routes — proxy to backend
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        # SSE and long-running ingestion support
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 310s;
    }

    # Frontend SPA — serve static files, fall back to index.html
    location / {
        root /usr/share/nginx/html;
        try_files $uri $uri/ /index.html;
    }
}
